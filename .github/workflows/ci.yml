name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  policy:
    # Enforces docs/INCIDENT-2026-05-18-lichess-ip-block.md — bulk scrapers
    # run from Cloud Run only. Cheap grep checks; runs in parallel with build.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: chess.com runbook keeps its Cloud-Run-only banner
        run: |
          set -e
          if ! grep -q "Production runs ONLY from Cloud Run" docs/CHESSCOM-CRAWL-RUNBOOK.md; then
            echo "::error file=docs/CHESSCOM-CRAWL-RUNBOOK.md::Cloud-Run-only banner missing. See docs/INCIDENT-2026-05-18-lichess-ip-block.md."
            exit 1
          fi

      - name: Lichess runbook stays a retired notice
        run: |
          set -e
          # Lichess crawler was retired 2026-05-18; the runbook must keep
          # its "RETIRED" header to prevent silent reintroduction of
          # local-first instructions. See INCIDENT-2026-05-18-lichess-ip-block.md.
          if ! grep -q "RETIRED" docs/LICHESS-CRAWL-RUNBOOK.md; then
            echo "::error file=docs/LICHESS-CRAWL-RUNBOOK.md::RETIRED notice missing. See docs/INCIDENT-2026-05-18-lichess-ip-block.md."
            exit 1
          fi

      - name: No local crawl-loop wrappers
        run: |
          set -e
          matches=$(find apps/workers/scripts -maxdepth 1 -type f -iname '*crawl-loop*' 2>/dev/null || true)
          if [ -n "$matches" ]; then
            echo "::error::Local crawl-loop wrappers are forbidden (see docs/INCIDENT-2026-05-18-lichess-ip-block.md):"
            echo "$matches"
            exit 1
          fi

      - name: No per-handle Lichess crawler resurrection
        run: |
          set -e
          # The lichess-crawl/ directory + lichess-titled/ + fast-lane-lichess bulk CLI
          # were retired 2026-05-18 after Lichess confirmed bulk per-handle API
          # enumeration is forbidden. Block resurrection at PR time.
          forbidden=""
          for path in \
            apps/workers/src/lichess-crawl \
            apps/workers/src/lichess-titled \
            apps/workers/src/features/fast-lane-lichess.ts \
            apps/workers/Dockerfile.lichess-crawl \
            apps/workers/src/lichess-dumps/extract-handles.ts
          do
            if [ -e "$path" ]; then forbidden="$forbidden\n  $path"; fi
          done
          if [ -n "$forbidden" ]; then
            echo "::error::Retired Lichess per-handle crawler paths reintroduced (see docs/INCIDENT-2026-05-18-lichess-ip-block.md):"
            printf '%b\n' "$forbidden"
            exit 1
          fi

      - name: Crawl runbooks don't reintroduce "Local-first" tagline
        run: |
          set -e
          matches=$(grep -nE '^[^>]*[Ll]ocal-first' docs/LICHESS-CRAWL-RUNBOOK.md docs/CHESSCOM-CRAWL-RUNBOOK.md || true)
          if [ -n "$matches" ]; then
            echo "::error::Crawl runbooks must not describe themselves as 'Local-first' (lines outside blockquotes):"
            echo "$matches"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
