name: Daily benchmarks refresh

# Re-runs the Name-search coverage stats and the PGN sparse-cascade benchmark
# every night, commits the refreshed JSON artifacts (apps/web/public/
# coverage-stats.json and sparse-cascade-benchmark.json), and lets Vercel
# auto-deploy. The /benchmarks page reads these at build time and surfaces a
# visible "last refresh <date>" badge in the hero.
#
# Trade-off note: eval:cascade has historically taken ~60 min. If runner cost
# becomes an issue, split this into two workflows (coverage daily, cascade
# 2-3x/week on a separate schedule) and gate cascade with workflow_dispatch
# for ad-hoc runs.

on:
  schedule:
    # 06:00 UTC daily — early enough that Vercel rebuilds before morning
    # traffic, late enough that European tournaments from the previous day
    # are ingested.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-benchmarks
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # Supabase (federation_players, platform_players, account_fingerprints,
      # fingerprint_terms). The eval scripts call dotenv/config first so
      # process.env overrides any local .env if checked in.
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      DATABASE_PASSWORD: ${{ secrets.SUPABASE_DATABASE_PASSWORD }}
      # Games corpus on Cloud SQL — only used by eval:cascade when sampling
      # target games. Safe to leave unset if cascade only reads from Supabase.
      GAMES_DATABASE_URL: ${{ secrets.GAMES_DATABASE_URL }}
      GAMES_DATABASE_SSLMODE: ${{ secrets.GAMES_DATABASE_SSLMODE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write access to push back the JSON updates.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh name-search coverage
        run: pnpm --filter @chessco/workers eval:coverage

      - name: Refresh PGN sparse-cascade benchmark
        run: pnpm --filter @chessco/workers eval:cascade

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/coverage-stats.json apps/web/public/sparse-cascade-benchmark.json
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
            exit 0
          fi
          git commit -m "chore(benchmarks): daily refresh [skip ci]"
          git push origin HEAD:main
